<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" role="img" aria-labelledby="ia-title ia-desc" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Inter,sans-serif">
  <title id="ia-title">Before and after: the getting-started page</title>
  <desc id="ia-desc">Before, Vapi's page offers four competing entry points and no code, so the reader leaves to find it. After, one path leads from create to connect to talk to a working agent.</desc>
  <rect width="760" height="320" rx="14" fill="#000714"/>

  <!-- divider -->
  <line x1="380" y1="24" x2="380" y2="296" stroke="#FFFAEB" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="3 5"/>

  <!-- BEFORE -->
  <text x="28" y="40" fill="#FFFAEB" font-size="12" font-weight="500" letter-spacing="1.5" opacity="0.55">BEFORE</text>
  <text x="28" y="60" fill="#FFFAEB" font-size="13" opacity="0.85">Four doors, no code</text>

  <g font-size="12.5">
    <rect x="28" y="80" width="150" height="34" rx="8" fill="#FFFAEB" opacity="0.03" stroke="#FFFAEB" stroke-opacity="0.22"/>
    <text x="44" y="101" fill="#FFFAEB" opacity="0.8">Dashboard</text>
    <rect x="28" y="122" width="150" height="34" rx="8" fill="#FFFAEB" opacity="0.03" stroke="#FFFAEB" stroke-opacity="0.22"/>
    <text x="44" y="143" fill="#FFFAEB" opacity="0.8">Web SDK</text>
    <rect x="28" y="164" width="150" height="34" rx="8" fill="#FFFAEB" opacity="0.03" stroke="#FFFAEB" stroke-opacity="0.22"/>
    <text x="44" y="185" fill="#FFFAEB" opacity="0.8">CLI</text>
    <rect x="28" y="206" width="150" height="34" rx="8" fill="#FFFAEB" opacity="0.03" stroke="#FFFAEB" stroke-opacity="0.22"/>
    <text x="44" y="227" fill="#FFFAEB" opacity="0.8">Use cases</text>
  </g>

  <!-- arrows to the question node -->
  <g stroke="#FFFAEB" stroke-opacity="0.25" stroke-width="1.2" fill="none" marker-end="url(#ia-dim)">
    <path d="M 178 97 Q 230 97 244 128"/>
    <path d="M 178 139 L 246 139"/>
    <path d="M 178 181 Q 230 181 244 150"/>
    <path d="M 178 223 Q 250 223 250 152"/>
  </g>

  <!-- question node -->
  <circle cx="292" cy="139" r="30" fill="#FFFAEB" fill-opacity="0.03" stroke="#FFFAEB" stroke-opacity="0.3" stroke-dasharray="4 4"/>
  <text x="292" y="146" text-anchor="middle" fill="#FFFAEB" font-size="22" opacity="0.7">?</text>
  <text x="292" y="196" text-anchor="middle" fill="#FFFAEB" font-size="11" opacity="0.5">pick a door,</text>
  <text x="292" y="210" text-anchor="middle" fill="#FFFAEB" font-size="11" opacity="0.5">then leave to find code</text>

  <!-- AFTER -->
  <text x="410" y="40" fill="#0BD8B6" font-size="12" font-weight="500" letter-spacing="1.5">AFTER</text>
  <text x="410" y="60" fill="#FFFAEB" font-size="13" opacity="0.85">One path, code on the page</text>

  <g font-size="12.5">
    <rect x="410" y="82" width="300" height="40" rx="9" fill="#0BD8B6" opacity="0.1" stroke="#0BD8B6" stroke-opacity="0.5"/>
    <text x="428" y="107" fill="#0BD8B6" font-weight="500">1</text>
    <text x="452" y="107" fill="#FFFAEB" opacity="0.9">Create an agent — one API call</text>

    <rect x="410" y="132" width="300" height="40" rx="9" fill="#0BD8B6" opacity="0.1" stroke="#0BD8B6" stroke-opacity="0.5"/>
    <text x="428" y="157" fill="#0BD8B6" font-weight="500">2</text>
    <text x="452" y="157" fill="#FFFAEB" opacity="0.9">Connect — the Web SDK</text>

    <rect x="410" y="182" width="300" height="40" rx="9" fill="#0BD8B6" opacity="0.1" stroke="#0BD8B6" stroke-opacity="0.5"/>
    <text x="428" y="207" fill="#0BD8B6" font-weight="500">3</text>
    <text x="452" y="207" fill="#FFFAEB" opacity="0.9">Talk — click and speak</text>
  </g>

  <g stroke="#0BD8B6" stroke-width="1.6" fill="none" marker-end="url(#ia-teal)">
    <line x1="560" y1="122" x2="560" y2="132"/>
    <line x1="560" y1="172" x2="560" y2="182"/>
  </g>

  <!-- success -->
  <rect x="470" y="244" width="180" height="40" rx="9" fill="#62F6B5" opacity="0.14" stroke="#62F6B5" stroke-opacity="0.6"/>
  <text x="560" y="269" text-anchor="middle" fill="#62F6B5" font-size="12.5" font-weight="500">a working voice agent</text>
  <line x1="560" y1="222" x2="560" y2="244" stroke="#62F6B5" stroke-width="1.6" fill="none" marker-end="url(#ia-mint)"/>

  <defs>
    <marker id="ia-dim" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#FFFAEB" fill-opacity="0.35"/></marker>
    <marker id="ia-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0BD8B6"/></marker>
    <marker id="ia-mint" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#62F6B5"/></marker>
  </defs>
</svg>
