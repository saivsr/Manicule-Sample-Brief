name: checks

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Editorial gate (lint every prose file)
        run: node harness/src/lint.ts

      - name: Agent eval (grade every run against Vapi's spec)
        run: |
          for f in eval/runs/*.txt; do
            echo "== $f =="
            node eval/grade.ts "$f" | grep '"score"'
          done
